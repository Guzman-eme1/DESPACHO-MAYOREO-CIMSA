<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Despachos CIMSA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .header { background: #001529; color: white; padding: 20px; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        .buscador { width: 100%; padding: 15px; font-size: 16px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 20px; box-sizing: border-box; }
        .ruta-card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 6px solid #1890ff; shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .transporte { font-size: 1.2em; color: #1890ff; font-weight: bold; }
        .estado { display: inline-block; padding: 5px 10px; border-radius: 5px; font-size: 0.9em; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>DESPACHO MAYOREO CIMSA</h1>
        <p>Consulta de rutas en tiempo real</p>
    </div>

    <input type="text" id="busqueda" class="buscador" placeholder="Busca tu placa o transporte..." onkeyup="filtrar()">
    
    <div id="contenedor-rutas">Cargando datos...</div>

    <script>
        // Aquí pegaremos luego el link de tu Google Sheets
        const public_url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR_PQvvyHOSvSE4b0X8oBKUPEbe4gva0hOPJND2FNrIZs16Vl_7I4jRlPaPCAYumOFzMaPRc4ebpJeG/pub?output=csv';

        function init() {
            Papa.parse(public_url, {
                download: true, header: true,
                complete: function(results) { mostrarDatos(results.data); }
            });
        }

   function mostrarDatos(data) {
            let html = '';
            data.forEach(fila => {
                // Filtramos para que solo muestre filas que tengan un Piloto o Transporte real
                // Ignoramos los títulos como "DESPACHO..." o filas vacías
                const tienePiloto = fila.PILOTO || fila.No; 
                const noEsTitulo = !fila.PILOTO?.includes('DESPACHO');

                if(tienePiloto && noEsTitulo && fila.PILOTO !== 'PILOTO') {
                    html += `
                    <div class="ruta-card">
                        <div class="transporte">🚛 ${fila.TRANSPORTE || fila.No || '---'}</div>
                        <div><strong>Piloto:</strong> ${fila.PILOTO || '---'}</div>
                        <div><strong>Equipo (EQ):</strong> ${fila.EQ || '---'}</div>
                        <div><strong>Código Facility:</strong> ${fila['CODIGO FACILITY'] || '---'}</div>
                        <div><strong>Consolidado ERP:</strong> ${fila['CONSOLIDADO ERP'] || '---'}</div>
                        <div style="margin-top:5px; font-size: 0.8em; color: #666;">
                            <strong># Pedidos:</strong> ${fila['# DE PEDIDO'] || '---'}
                        </div>
                    </div>`;
                }
            });
            
            if (html === '') {
                document.getElementById('contenedor-rutas').innerHTML = "No hay despachos programados por ahora.";
            } else {
                document.getElementById('contenedor-rutas').innerHTML = html;
            }
        }ntenedor-rutas').innerHTML = html;
        }

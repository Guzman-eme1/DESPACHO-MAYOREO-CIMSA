<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Despachos CIMSA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .header { background: #001529; color: white; padding: 20px; text-align: center; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .buscador { width: 100%; padding: 15px; font-size: 16px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 20px; box-sizing: border-box; outline: none; }
        .buscador:focus { border-color: #1890ff; box-shadow: 0 0 5px rgba(24,144,255,0.5); }
        #contenedor-rutas { display: grid; gap: 15px; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
        .ruta-card { background: white; padding: 20px; border-radius: 12px; border-left: 6px solid #1890ff; shadow: 0 2px 10px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .ruta-card:hover { transform: translateY(-3px); }
        .transporte { font-size: 1.3em; color: #1890ff; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; }
        .dato { margin-bottom: 5px; font-size: 1em; color: #333; }
        .dato strong { color: #555; }
        .pedido { background: #e6f7ff; padding: 8px; border-radius: 5px; font-size: 0.85em; margin-top: 10px; border: 1px dashed #91d5ff; }
        .loading { text-align: center; font-size: 1.2em; color: #666; padding: 50px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>DESPACHO MAYOREO CIMSA</h1>
        <p>Consulta de rutas y pilotos en tiempo real</p>
    </div>

    <input type="text" id="busqueda" class="buscador" placeholder="Busca por Piloto, Transporte o Pedido..." onkeyup="filtrar()">
    
    <div id="contenedor-rutas" class="loading">Conectando con el servidor de datos...</div>

    <script>
        // PEGA AQUÍ TU LINK DE GOOGLE SHEETS (DEBE TERMINAR EN output=csv)
        const public_url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR_PQvvyHOSvSE4b0X8oBKUPEbe4gva0hOPJND2FNrIZs16Vl_7I4jRlPaPCAYumOFzMaPRc4ebpJeG/pub?output=csv';

       function init() {
            Papa.parse(public_url, {
                download: true,
                header: false,
                complete: function(results) {
                    procesarDatosFlexibles(results.data);
                },
                error: function() {
                    document.getElementById('contenedor-rutas').innerHTML = "Error al conectar con los datos.";
                }
            });
        }

        function procesarDatosFlexibles(filas) {
            let html = '';
            filas.forEach((fila) => {
                const piloto = fila[2] || '';
                const transporte = fila[1] || '';
                
                if (piloto && !piloto.includes('DESPACHO') && piloto !== 'PILOTO' && piloto !== 'EQ') {
                    html += `
                    <div class="ruta-card">
                        <div class="transporte">🚛 ${transporte}</div>
                        <div class="dato"><strong>Piloto:</strong> ${piloto}</div>
                        <div class="dato"><strong>Equipo (EQ):</strong> ${fila[3] || '---'}</div>
                        <div class="dato"><strong>Facility:</strong> ${fila[4] || '---'}</div>
                        <div class="dato"><strong>Consolidado:</strong> ${fila[5] || '---'}</div>
                        <div class="pedido"><strong># Pedidos:</strong><br>${fila[6] || '---'}</div>
                    </div>`;
                }
            });

            const contenedor = document.getElementById('contenedor-rutas');
            contenedor.classList.remove('loading');
            contenedor.innerHTML = html || "No se encontraron despachos activos.";
        }

        function filtrar() {
            let filtro = document.getElementById('busqueda').value.toUpperCase();
            let cards = document.getElementsByClassName('ruta-card');
            for (let i = 0; i < cards.length; i++) {
                let texto = cards[i].innerText.toUpperCase();
                cards[i].style.display = texto.indexOf(filtro) > -1 ? "" : "none";
            }
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
